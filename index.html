<!DOCTYPE html>
<html>
<head>
  <title>AI Study Chat</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial;
      background: #0b1220;
      color: white;
    }

    .topbar {
      background: #0f172a;
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 1px solid #1f2937;
    }

    .chat {
      height: calc(100vh - 140px);
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      max-width: 70%;
      line-height: 1.4;
      font-size: 15px;
      word-wrap: break-word;
    }

    .user {
      margin-left: auto;
      background: #2563eb;
      color: white;
    }

    .bot {
      background: #1f2937;
    }

    .inputbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      gap: 10px;
      padding: 12px;
      background: #0f172a;
      border-top: 1px solid #1f2937;
    }

    input {
      flex: 1;
      padding: 14px;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      outline: none;
      background: #111827;
      color: white;
    }

    button {
      padding: 14px 18px;
      font-size: 15px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <div class="topbar">📚 AI Study Assistant (Class 8)</div>

  <div class="chat" id="chat">
    <div class="msg bot">Hello! Ask me anything 😊</div>
  </div>

  <div class="inputbar">
    <input id="q" placeholder="Type your question..." />
    <button onclick="ask()">Send</button>
  </div>

  <script>
    async function ask() {
      let q = document.getElementById("q").value;
      let chat = document.getElementById("chat");

      if (!q) return;

      // show user message
      chat.innerHTML += `<div class="msg user">${q}</div>`;

      document.getElementById("q").value = "";

      // loading message
      let loading = document.createElement("div");
      loading.className = "msg bot";
      loading.innerText = "Thinking...";
      chat.appendChild(loading);

      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question: q })
        });

        const data = await res.json();

        loading.remove();

        let answer = data.answer || "No response";

        chat.innerHTML += `<div class="msg bot">${answer}</div>`;
        chat.scrollTop = chat.scrollHeight;

      } catch (err) {
        loading.remove();
        chat.innerHTML += `<div class="msg bot">Error connecting to server</div>`;
      }
    }
  </script>

</body>
</html>
